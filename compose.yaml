networks:
  sandbox:
    internal: true
  ingress: {}

volumes:
  gitea-data:
  gitea-config:
  audit-data:

services:
  gitea:
    image: docker.gitea.com/gitea:1.25.4-rootless
    restart: always
    entrypoint: ["/bin/sh", "/setup/setup.sh"]
    networks:
      - sandbox
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: gitea.localhost
      GITEA__server__ROOT_URL: http://gitea.localhost:3001/
      GITEA__server__HTTP_PORT: "3000"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA_ADMIN_USER: admin
      GITEA_ADMIN_PASSWORD: admin
      GITEA_ADMIN_EMAIL: admin@localhost
    volumes:
      - gitea-data:/var/lib/gitea
      - gitea-config:/etc/gitea
      - ./gitea/setup.sh:/setup/setup.sh:ro
      - ./shared:/shared
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  audit:
    build:
      context: ./audit
    networks:
      - sandbox
    environment:
      PORT: 8080
      AUDIT_DB: "/etc/audit/audit.sqlite"
    volumes:
      - audit-data:/etc/audit
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  gateway:
    image: nginx:alpine
    networks:
      - sandbox
      - ingress
    ports:
      - "3001:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mark

  mark:
    build:
      context: ./agent
    networks:
      - sandbox
    environment:
      PORT: "8080"
      GITEA_HOST: "http://gitea:3000"
      GITEA_ACCESS_TOKEN_PATH: /etc/agent/gitea-access-token.txt
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"
      AGENT_ID: mark
      AGENT_AUDIT_URL: "http://audit:8080/audits"
      ANTHROPIC_BASE_URL: "http://gateway:8443"
    volumes:
      - ./shared/gitea-token-mark:/etc/agent/gitea-access-token.txt
      - ./prompts/BASE.md:/etc/agent/prompts/0.md
      - ./prompts/PROJECT_MANAGER.md:/etc/agent/prompts/1.md
    depends_on:
      gitea:
        condition: service_healthy
      audit:
        condition: service_healthy
